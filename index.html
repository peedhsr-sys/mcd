<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Template Filler</title>
    <!-- pdf-lib लाइब्रेरी को सीधे इंटरनेट से लोड कर रहे हैं (बिना इंस्टॉल किए) -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #1d4ed8; }
        .note { font-size: 12px; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>अपना PDF यहाँ भरें</h2>
        
        <div class="form-group">
            <label>1. खाली PDF टेम्पलेट अपलोड करें (जिसमें डेटा भरना है):</label>
            <input type="file" id="pdfUpload" accept="application/pdf">
        </div>

        <div style="border-top: 1px solid #eee; margin: 20px 0;"></div>

        <label>2. डिटेल्स भरें:</label>
        <div class="form-group"><label>नाम (Name):</label><input type="text" id="name" value="RAHUL GUPTA"></div>
        <div class="form-group"><label>लिंग (Gender):</label><input type="text" id="gender" value="MALE"></div>
        <div class="form-group"><label>जन्म तिथि (DOB):</label><input type="text" id="dob" value="24/06/2021"></div>
        <div class="form-group"><label>जन्म स्थान (Place of Birth):</label><input type="text" id="place" value="SWAMY DAYANAND HOSPITAL"></div>
        
        <button onclick="fillPDF()">नया PDF डाउनलोड करें</button>
        <div class="note">यह टूल 100% सुरक्षित है और आपके ब्राउज़र के अंदर काम करता है।</div>
    </div>

    <script>
        async function fillPDF() {
            const fileInput = document.getElementById('pdfUpload');
            if (fileInput.files.length === 0) {
                alert('कृपया पहले अपना PDF फाइल अपलोड करें!');
                return;
            }

            try {
                // 1. अपलोड की गई PDF फाइल को रीड करें
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();

                // 2. pdf-lib का इस्तेमाल करके PDF लोड करें
                const { PDFDocument, rgb } = PDFLib;
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const pages = pdfDoc.getPages();
                const firstPage = pages[0]; // पहले पेज पर काम कर रहे हैं

                // 3. फॉर्म से आपके डाले गए नाम/डिटेल निकालें
                const name = document.getElementById('name').value;
                const gender = document.getElementById('gender').value;
                const dob = document.getElementById('dob').value;
                const place = document.getElementById('place').value;

                // 4. PDF पर टेक्स्ट लिखें (X और Y कोऑर्डिनेट्स सेट करें)
                // ध्यान दें: PDF में Y=0 सबसे नीचे (Bottom) होता है। 
                // आपको अपने PDF के हिसाब से इन x और y नंबरों को बदलना पड़ेगा ताकि टेक्स्ट सही लाइन पर छपे।
                const fontSize = 11;
                const textColor = rgb(0, 0, 0); // Black color
                const fontName = 'Helvetica'; // Basic font fallback

                firstPage.drawText(name, { x: 250, y: 600, size: fontSize, color: textColor });
                firstPage.drawText(gender, { x: 250, y: 575, size: fontSize, color: textColor });
                firstPage.drawText(dob, { x: 250, y: 550, size: fontSize, color: textColor });
                firstPage.drawText(place, { x: 250, y: 525, size: fontSize, color: textColor });

                // 5. नया PDF सेव करें और डाउनलोड करवाएं
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = 'Edited_Document.pdf';
                link.click();
                
            } catch (error) {
                console.error(error);
                alert('PDF बनाने में कोई एरर आ गया। कृपया कंसोल चेक करें।');
            }
        }
    </script>
</body>
</html>
