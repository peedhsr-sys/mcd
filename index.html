<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Birth Certificate Editor</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Birth Certificate</h2>
    <input type="text" id="name" placeholder="Name (AMAAN ANSARI)">
    <input type="text" id="father" placeholder="Father's Name (WAHID)">
    <input type="text" id="mother" placeholder="Mother's Name (KANCHAN)">
    <input type="text" id="address" placeholder="Address (A-288, OLD SEEMA PURI...)">
    <button onclick="editPDF()">Download Edited PDF</button>
</div>

<script>
    async function editPDF() {
        // आपकी फाइल का नाम 'template.pdf' होना चाहिए
        const url = './template.pdf'; 
        const existingPdfBytes = await fetch(url).then(res => res.arrayBuffer());

        const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
        const pages = pdfDoc.getPages();
        const firstPage = pages[0];
        const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

        // डेटा उठाएं
        const name = document.getElementById('name').value;
        const father = document.getElementById('father').value;
        const mother = document.getElementById('mother').value;
        const address = document.getElementById('address').value;

        // पुराने टेक्स्ट को सफेद बॉक्स से ढंकना (Coordinates PDF के हिसाब से सेट करने होंगे)
        // ध्यान दें: ये वैल्यूज अंदाज़न हैं, आपको इन्हें अपनी PDF के प्रिंट के हिसाब से सेट करना होगा
        firstPage.drawRectangle({ x: 150, y: 650, width: 250, height: 15, color: PDFLib.rgb(1, 1, 1) });
        
        // नया टेक्स्ट लिखना
        if(name) firstPage.drawText(name, { x: 155, y: 652, size: 11, font: font });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "Edited_Birth_Certificate.pdf";
        link.click();
    }
</script>
</body>
</html>
